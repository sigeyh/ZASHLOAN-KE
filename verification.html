<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Verification - Zash Loan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-red-700 via-red-600 to-red-500 text-white min-h-screen px-4 py-6 font-sans">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <img src="zashlogo.jpeg" alt="Zash Logo" class="w-12 h-12 rounded-full">
    <h1 class="text-2xl font-bold">Zash Loan</h1>
  </div>

  <!-- Loan Summary -->
  <div class="bg-white bg-opacity-10 p-4 rounded-xl mb-6">
    <h2 class="text-xl font-semibold mb-2">Loan Summary</h2>
    <p><strong>Loan Amount:</strong> Ksh <span id="amount">-</span></p>
    <p><strong>Service Fee:</strong> Ksh <span id="fee">-</span></p>
    <p><strong>Request Date:</strong> <span id="requestDate">-</span></p>
    <p><strong>Due Date:</strong> <span id="dueDate">-</span></p>
    <p><strong>M-Pesa Number:</strong> <span id="phone">-</span></p>
  </div>

  <!-- PayHero Payment Button -->
  <div class="bg-white bg-opacity-10 p-4 rounded-xl mb-6 text-center">
    <h2 class="text-xl font-semibold mb-4">Complete Payment</h2>
    <p class="mb-4">Pay <span class="font-bold text-yellow-300">Ksh <span id="pay-amount">-</span></span> to proceed.</p>
    <button id="payhero-button" class="w-full bg-yellow-400 text-black font-bold py-3 rounded-full hover:bg-yellow-300 shadow-lg disabled:opacity-50">
      Pay Now with M-Pesa
    </button>
    <p id="status-message" class="mt-4 text-sm hidden"></p>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem('loanRequest')) || {};

    document.getElementById('amount').textContent = data.amount?.toLocaleString() || '-';
    document.getElementById('fee').textContent = data.serviceFee?.toLocaleString() || '-';
    document.getElementById('pay-amount').textContent = data.serviceFee?.toLocaleString() || '-';
    document.getElementById('requestDate').textContent = data.requestDate || '-';
    document.getElementById('dueDate').textContent = data.dueDate || '-';
    document.getElementById('phone').textContent = data.phone || '-';

    document.getElementById('payhero-button').addEventListener('click', async function() {
      const btn = document.getElementById('payhero-button');
      const status = document.getElementById('status-message');
      
      btn.disabled = true;
      status.textContent = "Initiating STK Push...";
      status.classList.remove('hidden', 'text-red-300', 'text-green-300');
      status.classList.add('text-yellow-250');
      status.style.display = "block";

      // Normalise phone number to 254XXXXXXXXX
      let phone = (data.phone || '').replace(/\s+/g, '');
      if (phone.startsWith('0')) {
        phone = '254' + phone.substring(1);
      } else if (phone.startsWith('+')) {
        phone = phone.substring(1);
      }

      try {
        // Direct PayHero API STK Push request
        const response = await fetch('https://backend.payhero.co.ke/api/v2/payments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Basic Rm1JTVZDSWxQOVBQdU5qWUNVZnY6aFBnem1YelJxMzd2ZGxRRElYVmJiZGFyOWZRR1BiMTVhMEdFZEV4cg=='
          },
          body: JSON.stringify({
            amount: data.serviceFee,
            phone_number: phone,
            channel_id: 6770,
            external_reference: "ZASH_" + Date.now(),
            callback_url: "https://backend.payhero.co.ke/api/v2/payments",
            provider: "m-pesa"
          })
        });

        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.message || 'Failed to initiate payment');
        }

        const checkoutId = result.checkout_request_id || result.CheckoutRequestID;
        
        if (checkoutId) {
          status.textContent = "STK push sent! Checking payment status...";
          status.classList.replace('text-yellow-250', 'text-green-300');
          
          let attempts = 0;
          const maxAttempts = 20; // 60 seconds
          const interval = setInterval(async () => {
            attempts++;
            try {
              const statusRes = await fetch(`https://backend.payhero.co.ke/api/v2/transaction-status?checkout_request_id=${checkoutId}`, {
                method: 'GET',
                headers: {
                  'Authorization': 'Basic Rm1JTVZDSWxQOVBQdU5qWUNVZnY6aFBnem1YelJxMzd2ZGxRRElYVmJiZGFyOWZRR1BiMTVhMEdFZEV4cg=='
                }
              });

              if (statusRes.ok) {
                const statusData = await statusRes.json();
                const resultCode = statusData.ResultCode ?? statusData.result_code;
                
                if (resultCode === 0 || resultCode === '0') {
                  clearInterval(interval);
                  status.textContent = "Payment Verified Successfully! Redirecting...";
                  setTimeout(() => {
                    window.location.href = "success.html";
                  }, 1500);
                } else if (resultCode !== undefined && resultCode !== null) {
                  clearInterval(interval);
                  status.textContent = "Payment declined/failed. Please try again.";
                  status.classList.add('text-red-300');
                  btn.disabled = false;
                }
              }
            } catch (err) {
              console.error("Polling error:", err);
            }

            if (attempts >= maxAttempts) {
              clearInterval(interval);
              status.textContent = "Payment timeout. If you completed payment, please wait a moment or try again.";
              status.classList.add('text-red-300');
              btn.disabled = false;
            }
          }, 3000);
        } else {
          // Fallback if no checkout_request_id is returned
          status.textContent = "STK push sent to your phone. Redirecting...";
          setTimeout(() => {
            window.location.href = "success.html";
          }, 4000);
        }
      } catch (error) {
        console.error("STK push error:", error);
        status.textContent = "Error: " + error.message;
        status.classList.add('text-red-300');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
